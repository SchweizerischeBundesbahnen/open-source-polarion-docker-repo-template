[tox]
# Python version resolved by uv from .tool-versions - no manual update needed
envlist =
    ruff
    mypy
    test

[testenv]
description = run pytest and coverage
runner = uv-venv-lock-runner
dependency_groups =
    dev
    test
commands =
    coverage run -m pytest tests/ --junitxml="junittest.xml" -v
    coverage report -m --fail-under 80
    coverage xml

[testenv:ruff]
description = run ruff linter and formatter
package = skip
dependency_groups = dev
commands =
    ruff format
    ruff check

[testenv:mypy]
description = run mypy type checker
package = skip
dependency_groups = dev
commands =
    mypy .

[coverage:run]
relative_files = True
source = app/
branch = True
